[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

# Proxy API requests to the DigitalOcean backend.
# This keeps cookies first-party (same domain) and avoids
# third-party cookie blocking in modern browsers.
[[redirects]]
  from = "/api/*"
  to = "https://microdegreehub-holzf.ondigitalocean.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
